<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pranab Debnath — Omniverse</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* =========================================================
   OMNIVERSE — FINAL PRODUCTION CSS
========================================================= */

:root {
  --bg-main:#05030c;
  --bg-deep:#090613;

  --violet:#a78bfa;
  --violet-blue:#60a5fa;
  --violet-glow:rgba(167,139,250,.35);

  --text-main:rgba(255,255,255,.96);
  --text-muted:rgba(255,255,255,.65);

  --ease:cubic-bezier(.22,1,.36,1);
}

/* RESET */
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }

body {
  font-family:Inter,system-ui,-apple-system,sans-serif;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,58,237,.20), transparent),
    radial-gradient(700px 520px at 15% 120%, rgba(167,139,250,.18), transparent),
    linear-gradient(180deg,#04020a,var(--bg-deep) 55%,#04020a);
}

/* STAR LAYERS */
#stars,
#shooting-stars {
  position:fixed;
  inset:0;
  pointer-events:none;
}

#stars { z-index:-3; }
#shooting-stars { z-index:-2; }

/* HERO */
.hero {
  max-width:1100px;
  margin:0 auto;
  padding:10rem 2rem 6rem;
}

.hero h1 {
  font-size:clamp(42px,6vw,64px);
  font-weight:500;
  letter-spacing:-.035em;
  margin:0;
}

.hero .tagline {
  margin-top:1.4rem;
  color:var(--violet);
  font-weight:500;
}

.hero p {
  margin-top:1.4rem;
  max-width:60ch;
  color:var(--text-muted);
}

/* DASHBOARD */
.dashboard {
  margin-top:4.5rem;
  padding:3.6rem;
  border-radius:32px;
  position:relative;
  overflow:hidden;

  background:
    radial-gradient(
      140% 120% at 12% 8%,
      rgba(255,255,255,.25),
      rgba(255,255,255,.08) 38%,
      rgba(9,6,19,.90) 78%
    );

  backdrop-filter:blur(28px) saturate(160%);
  box-shadow:
    0 80px 180px rgba(0,0,0,.95),
    inset 0 1px 0 rgba(255,255,255,.25);

  transition:transform 900ms var(--ease), box-shadow 900ms var(--ease);
}

@media (hover:hover) {
  .dashboard:hover {
    transform:translateY(-10px) scale(1.01);
    box-shadow:
      0 120px 240px rgba(0,0,0,1),
      0 0 90px var(--violet-glow);
  }
}

/* Dashboard glow */
.dashboard::after {
  content:"";
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(circle at 30% 40%, rgba(167,139,250,.35), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(96,165,250,.25), transparent 60%);
  filter:blur(180px);
  opacity:.6;
  pointer-events:none;
}

/* KPIs */
.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:2rem;
  margin-bottom:2.5rem;
}

.kpi {
  padding:1.4rem 1.6rem;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  box-shadow:0 16px 36px rgba(0,0,0,.6);
}

.kpi span {
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
}

.kpi strong {
  display:block;
  margin-top:.5rem;
  font-size:22px;
  color:var(--violet);
}

/* GRAPH PLACEHOLDER */
.graph {
  height:260px;
  border-radius:20px;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.08),
      rgba(255,255,255,.015)
    );
  box-shadow:inset 0 0 60px rgba(255,255,255,.05);
}

/* FOOTER */
footer {
  padding:6rem 2rem;
  text-align:center;
  color:rgba(255,255,255,.4);
}

/* REDUCED MOTION */
@media (prefers-reduced-motion:reduce) {
  * { animation:none !important; transition:none !important; }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<canvas id="stars"></canvas>
<svg id="shooting-stars"></svg>

<main class="hero">
  <h1>Pranab Debnath</h1>
  <div class="tagline">Data • Analytics • Automation</div>
  <p>
    I design analytical systems that turn raw data into strategic,
    data-driven decisions with precision and clarity.
  </p>

  <div class="dashboard">
    <div class="kpis">
      <div class="kpi"><span>Revenue</span><strong>₹4.8M</strong></div>
      <div class="kpi"><span>Growth</span><strong>+32%</strong></div>
      <div class="kpi"><span>Conversion</span><strong>5.4%</strong></div>
    </div>
    <div class="graph"></div>
  </div>
</main>

<footer>© Pranab Debnath</footer>

<script>
/* =========================================================
   STARS (Canvas)
========================================================= */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
let stars=[];
const density=0.00015;

function resizeStars(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
  const count=Math.floor(innerWidth*innerHeight*density);
  stars=Array.from({length:count},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*.8+.4,
    o:Math.random()*.5+.4,
    t:Math.random()*.8+.4
  }));
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.o})`;
    ctx.fill();
    s.o=.5+Math.abs(Math.sin(Date.now()*.001/s.t)*.5);
  });
  requestAnimationFrame(drawStars);
}

resizeStars();
drawStars();
addEventListener("resize",resizeStars);

/* =========================================================
   SHOOTING STARS (SVG)
========================================================= */
const svg=document.getElementById("shooting-stars");
svg.innerHTML=`
<defs>
  <linearGradient id="trail">
    <stop offset="0%" stop-color="rgba(96,165,250,0)" />
    <stop offset="100%" stop-color="#a78bfa" />
  </linearGradient>
</defs>`;

function shoot(){
  const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
  let x=Math.random()*innerWidth;
  let y=-100;
  const angle=45+Math.random()*20;

  r.setAttribute("x",x);
  r.setAttribute("y",y);
  r.setAttribute("width",140);
  r.setAttribute("height",1.2);
  r.setAttribute("fill","url(#trail)");
  r.setAttribute("transform",`rotate(${angle} ${x} ${y})`);
  svg.appendChild(r);

  let d=0;
  function anim(){
    d+=18;
    r.setAttribute("x",x-d);
    r.setAttribute("y",y+d);
    if(d<innerWidth*1.2) requestAnimationFrame(anim);
    else r.remove();
  }
  anim();

  setTimeout(shoot,2000+Math.random()*4000);
}
shoot();
</script>

</body>
</html>
