<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pranab Debnath — Analytics & Systems</title>

<!-- ===============================
     FONTS (Premium, Apple-like)
================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
  rel="stylesheet"
/>

<style>
/* ============================================================
   OMNIVERSE — SINGLE FILE SYSTEM
   Apple • Liquid Glass • Premium Motion
============================================================ */

/* ================= ROOT ================= */
:root {
  --bg-main: #05030c;
  --bg-deep: #090613;

  --violet: #a78bfa;
  --violet-blue: #60a5fa;
  --violet-glow: rgba(167,139,250,0.35);

  --text-main: rgba(255,255,255,0.96);
  --text-muted: rgba(255,255,255,0.62);
  --text-faint: rgba(255,255,255,0.42);

  --ease-apple: cubic-bezier(0.22, 1, 0.36, 1);

  --radius-xl: 32px;
  --radius-lg: 22px;

  --space-section: clamp(5rem, 9vw, 9rem);
}

/* ================= RESET ================= */
*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text-main);
  overflow-x: hidden;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,58,237,0.18), transparent),
    radial-gradient(700px 520px at 15% 120%, rgba(167,139,250,0.14), transparent),
    linear-gradient(180deg, #04020a, var(--bg-deep) 55%, #04020a);
}

/* ================= COSMIC BACKGROUND ================= */
.starry-bg {
  position: fixed;
  inset: 0;
  z-index: -3;
  background:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.25), transparent),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.18), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.15), transparent);
  background-size: 1200px 800px;
  animation: star-drift 160s linear infinite;
}

@keyframes star-drift {
  from { transform: translateY(0); }
  to   { transform: translateY(-600px); }
}

.shooting-stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
}

.shooting-stars::before {
  content: "";
  position: absolute;
  top: -20%;
  left: 120%;
  width: 2px;
  height: 140px;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.9),
    rgba(167,139,250,0.4),
    transparent
  );
  opacity: 0;
  transform: rotate(-35deg);
  animation: shooting-star 14s ease-in-out infinite;
}

@keyframes shooting-star {
  0%, 70% { opacity: 0; }
  72% { opacity: 1; }
  85% {
    opacity: 0;
    transform: translate(-140vw, 140vh) rotate(-35deg);
  }
}

/* ================= TYPOGRAPHY ================= */
h1 {
  font-size: clamp(40px, 6vw, 64px);
  font-weight: 500;
  letter-spacing: -0.035em;
}

h2 {
  font-size: clamp(26px, 3vw, 34px);
  font-weight: 500;
  margin-bottom: 3rem;
}

p {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text-muted);
  max-width: 65ch;
}

/* ================= SECTIONS ================= */
section {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-section) 2rem;
}

/* ================= HERO ================= */
.hero-wrapper {
  max-width: 680px;
  display: flex;
  flex-direction: column;
  gap: 1.6rem;
}

.hero-tagline {
  color: var(--violet);
  font-weight: 500;
}

/* ================= HERO DASHBOARD (LIQUID GLASS) ================= */
.hero-dashboard-shell {
  margin-top: 4rem;
  padding: 3.2rem;
  border-radius: var(--radius-xl);
  position: relative;
  overflow: hidden;

  background:
    radial-gradient(
      120% 140% at 10% 0%,
      rgba(255,255,255,0.18),
      rgba(255,255,255,0.04) 45%,
      rgba(10,8,24,0.85) 75%
    );

  backdrop-filter: blur(22px) saturate(140%);

  box-shadow:
    0 60px 120px rgba(0,0,0,0.75);

  transition: transform 900ms var(--ease-apple),
              box-shadow 900ms var(--ease-apple);
}

.hero-dashboard-shell:hover {
  transform: translateY(-10px);
  box-shadow:
    0 90px 180px rgba(0,0,0,0.85),
    0 0 60px var(--violet-glow);
}

/* Edge light */
.hero-dashboard-shell::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    linear-gradient(
      140deg,
      rgba(255,255,255,0.45),
      transparent 40%,
      transparent 60%,
      rgba(167,139,250,0.35)
    );
  opacity: 0.25;
  pointer-events: none;
}

/* Glow */
.hero-dashboard-glow {
  position: absolute;
  inset: -60%;
  background:
    radial-gradient(circle at 30% 35%, rgba(167,139,250,0.35), transparent 50%),
    radial-gradient(circle at 70% 65%, rgba(96,165,250,0.25), transparent 55%);
  filter: blur(180px);
  opacity: 0.65;
  pointer-events: none;
}

/* Dashboard layout */
.hero-dashboard-grid {
  position: relative;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 3rem;
}

/* KPI */
.kpi-box {
  padding: 1.4rem 1.6rem;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.55);
  margin-bottom: 1.4rem;
}

.kpi-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.kpi-value {
  font-size: 22px;
  color: var(--violet);
  font-weight: 600;
}

/* Chart */
.dashboard-chart {
  height: 260px;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(
      140% 100% at 50% 0%,
      rgba(167,139,250,0.22),
      rgba(255,255,255,0.04) 40%,
      rgba(10,8,24,0.9) 80%
    );
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 20px 60px rgba(0,0,0,0.7);
}

/* ================= PROJECT DASHBOARD STORY ================= */
.dashboard-story {
  display: grid;
  gap: 7rem;
}

.dashboard-frame {
  padding: 3.4rem;
  border-radius: var(--radius-xl);
  background:
    radial-gradient(
      120% 120% at 20% 0%,
      rgba(255,255,255,0.16),
      rgba(255,255,255,0.04),
      rgba(10,8,24,0.9)
    );
  backdrop-filter: blur(20px);
  box-shadow: 0 60px 140px rgba(0,0,0,0.75);
  opacity: 0;
  transform: translateY(80px);
  transition: opacity 900ms var(--ease-apple),
              transform 900ms var(--ease-apple);
}

.dashboard-frame.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
  .hero-dashboard-grid {
    grid-template-columns: 1fr;
  }
  .hero-dashboard-shell {
    padding: 2rem;
  }
  .dashboard-chart {
    height: 200px;
  }
}

/* ================= REDUCED MOTION ================= */
@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
  }
}
</style>
</head>

<body>

<div class="starry-bg"></div>
<div class="shooting-stars"></div>

<!-- ================= HERO ================= -->
<section>
  <div class="hero-wrapper">
    <h1>Pranab Debnath</h1>
    <p class="hero-tagline">Data • Analytics • Automation</p>
    <p>
      I design analytical systems that transform raw data
      into clear, strategic decisions using automation.
    </p>
  </div>

  <div class="hero-dashboard-shell">
    <div class="hero-dashboard-glow"></div>

    <div class="hero-dashboard-grid">
      <div>
        <div class="kpi-box">
          <div class="kpi-label">Revenue</div>
          <div class="kpi-value">₹4.8M</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Growth</div>
          <div class="kpi-value">+32%</div>
        </div>
      </div>

      <div class="dashboard-chart"></div>
    </div>
  </div>
</section>

<!-- ================= PROJECTS ================= -->
<section>
  <h2>Projects</h2>

  <div class="dashboard-story">
    <div class="dashboard-frame">Revenue Funnel Optimization</div>
    <div class="dashboard-frame">Sales Performance Intelligence</div>
    <div class="dashboard-frame">Automation Control Center</div>
  </div>
</section>

<script>
/* ============================================================
   SIMPLE SCROLL REVEAL (SAFE, GPU-ONLY)
============================================================ */
const observer = new IntersectionObserver(
  entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add("is-visible");
      }
    });
  },
  { threshold: 0.25 }
);

document.querySelectorAll(".dashboard-frame").forEach(el => observer.observe(el));
</script>

</body>
</html>
