  --------------------------------------------------- -->

    body {
      background: #0b0b0f;
      color: #ffffff;
      font-family: Inter, system-ui, sans-serif;
      overflow-x: hidden;
    }

    .mouse-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 320px;
      pointer-events: none;
      background: radial-gradient(
        circle,
        rgba(120, 120, 255, 0.18),
        transparent 70%
      );
      transform: translate(-50%, -50%);
      z-index: 0;
    }
  </style>
