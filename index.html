<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =====================================================
       CORE META
  ====================================================== -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pranab Debnath — Data Analyst</title>

  <meta
    name="description"
    content="Pranab Debnath is a Data Analyst focused on SQL, Python, automation, and data-driven decision making."
  />
  <meta name="author" content="Pranab Debnath" />
  <meta name="theme-color" content="#05030c" />
  <meta name="color-scheme" content="dark light" />

  <!-- =====================================================
       SOCIAL SHARING
  ====================================================== -->
  <meta property="og:title" content="Pranab Debnath — Data Analyst" />
  <meta
    property="og:description"
    content="Data-driven professional building insights through SQL, Python, and automation."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://alsopranab.github.io/" />

  <!-- =====================================================
       FONTS
  ====================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- =====================================================
       STYLES
  ====================================================== -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body data-omniverse>

  <!-- =====================================================
       HEADER (Injected by header.js)
  ====================================================== -->
  <header id="site-header" aria-label="Primary Navigation"></header>

  <!-- =====================================================
       MAIN CONTENT (CANONICAL IDS — DO NOT CHANGE)
  ====================================================== -->
  <main id="page-content" role="main">

    <!-- HERO -->
    <section
      id="hero-section"
      class="omniverse-section"
      aria-label="Introduction"
    ></section>

    <!-- EXPERIENCE -->
    <section
      id="experience-section"
      class="omniverse-section"
      aria-label="Experience"
    ></section>

    <!-- FEATURED -->
    <section
      id="featured-section"
      class="omniverse-section"
      aria-label="Featured Work"
    ></section>

    <!-- PROJECTS -->
    <section
      id="projects-section"
      class="omniverse-section"
      aria-label="Projects"
    ></section>

    <!-- EDUCATION -->
    <section
      id="education-section"
      class="omniverse-section"
      aria-label="Education"
    ></section>

    <!-- LICENSES -->
    <section
      id="licenses-section"
      class="omniverse-section"
      aria-label="Licenses and Certifications"
    ></section>

    <!-- CONTACT -->
    <section
      id="contact-section"
      class="omniverse-section"
      aria-label="Contact"
    ></section>

  </main>

  <!-- =====================================================
       FOOTER (Injected by footer.js)
  ====================================================== -->
  <footer id="site-footer" aria-label="Footer"></footer>

  <!-- =====================================================
       CORE JS (ORDER IS CRITICAL)
       DO NOT REORDER
  ====================================================== -->

  <!-- 1. Bootstrap (emits app:ready) -->
  <script src="assets/js/core/bootstrap.js" defer></script>

  <!-- 2. Data layer -->
  <script src="assets/js/services/data.service.js" defer></script>

  <!-- 3. Layout -->
  <script src="assets/js/layout/header.js" defer></script>
  <script src="assets/js/layout/footer.js" defer></script>

  <!-- 4. Page controllers -->
  <script src="assets/js/pages/home.js" defer></script>

  <!-- 5. Renderer (listens to home:ready) -->
  <script src="assets/js/renderers/app.renderer.js" defer></script>

  <!-- 6. Motion & effects -->
  <script src="assets/js/interactions/ui.motion.js" defer></script>
  <script src="assets/js/omniverse.godmode.js" defer></script>

</body>
</html>
