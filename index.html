  <!-- =====================================================
       BACKGROUND STARS (GPU SAFE)
  ====================================================== -->
  <script>
    (() => {
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");
      let stars = [];

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        stars = Array.from(
          { length: innerWidth * innerHeight * 0.00015 },
          () => ({
            x: Math.random() * innerWidth,
            y: Math.random() * innerHeight,
            r: Math.random() * 1.2,
            o: Math.random()
          })
        );
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${s.o})`;
          ctx.fill();
          s.o += (Math.random() - 0.5) * 0.01;
        });
        requestAnimationFrame(draw);
      }

      resize();
      draw();
      addEventListener("resize", resize);
    })();
  </script>

  <!-- =====================================================
       DEMO CHARTS (INTENTIONALLY DIFFERENT)
  ====================================================== -->
  <script>
    function drawLine(id, data) {
      const c = document.getElementById(id);
      if (!c) return;
      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.strokeStyle = "rgba(255,255,255,.85)";
      ctx.lineWidth = 2.5;
      ctx.beginPath();

      data.forEach((v, i) => {
        const x = i * (c.width / (data.length - 1));
        const y = c.height - (v / 100) * c.height;
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });

      ctx.stroke();
    }

    // Overview: smoother, calm
    drawLine("trend1", [60, 62, 61, 64, 63, 66, 68]);

    // Intelligence: volatile, analytical
    drawLine("trend2", [20, 48, 30, 65, 40, 72, 55]);
  </script>
