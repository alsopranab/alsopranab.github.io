<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pranab Debnath • Data Analyst</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* =========================================================
   OMNIVERSE — FINAL PRODUCTION CSS
========================================================= */

:root {
  --bg-main:#05030c;
  --bg-deep:#090613;

  --violet:#a78bfa;
  --violet-blue:#60a5fa;
  --violet-glow:rgba(167,139,250,.35);

  --text-main:rgba(255,255,255,.96);
  --text-muted:rgba(255,255,255,.65);

  --ease:cubic-bezier(.22,1,.36,1);
}

/* RESET */
* { box-sizing:border-box; }
html,body { margin:0; padding:0; }

body {
  font-family:Inter,system-ui,-apple-system,sans-serif;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,58,237,.20), transparent),
    radial-gradient(700px 520px at 15% 120%, rgba(167,139,250,.18), transparent),
    linear-gradient(180deg,#04020a,var(--bg-deep) 55%,#04020a);
}

/* STAR LAYERS */
#stars,
#shooting-stars {
  position:fixed;
  inset:0;
  pointer-events:none;
}
#stars { z-index:-3; }
#shooting-stars { z-index:-2; }

/* SECTIONS */
section {
  max-width:1100px;
  margin:0 auto;
  padding:8rem 2rem;
}

/* HERO */
#hero-section h1 {
  font-size:clamp(42px,6vw,64px);
  font-weight:500;
  letter-spacing:-.035em;
  margin:0;
}

.hero-tagline {
  margin-top:1.4rem;
  color:var(--violet);
  font-weight:500;
}

.hero-summary {
  margin-top:1.4rem;
  max-width:60ch;
  color:var(--text-muted);
}

/* DASHBOARD */
.dashboard {
  margin-top:4.5rem;
  padding:3.6rem;
  border-radius:32px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(
      140% 120% at 12% 8%,
      rgba(255,255,255,.25),
      rgba(255,255,255,.08) 38%,
      rgba(9,6,19,.90) 78%
    );
  backdrop-filter:blur(28px) saturate(160%);
  box-shadow:
    0 80px 180px rgba(0,0,0,.95),
    inset 0 1px 0 rgba(255,255,255,.25);
}

/* KPIs */
.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:2rem;
  margin-bottom:2.5rem;
}

.kpi {
  padding:1.4rem 1.6rem;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  box-shadow:0 16px 36px rgba(0,0,0,.6);
}

.kpi span {
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(255,255,255,.45);
}

.kpi strong {
  display:block;
  margin-top:.5rem;
  font-size:22px;
  color:var(--violet);
}

/* GRAPH */
.graph {
  height:260px;
  border-radius:20px;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.08),
      rgba(255,255,255,.015)
    );
}

/* FOOTER */
footer {
  padding:6rem 2rem;
  text-align:center;
  color:rgba(255,255,255,.4);
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<canvas id="stars"></canvas>
<svg id="shooting-stars"></svg>

<!-- HERO -->
<section id="hero-section">
  <div class="hero-wrapper">
    <h1>Pranab Debnath</h1>
    <p class="hero-tagline">Data • Analytics • Automation</p>
    <p class="hero-summary">
      I design analytical systems that turn raw data into strategic,
      data-driven decisions with precision and clarity.
    </p>
  </div>

  <div class="dashboard">
    <div class="kpis">
      <div class="kpi"><span>Revenue</span><strong>₹4.8M</strong></div>
      <div class="kpi"><span>Growth</span><strong>+32%</strong></div>
      <div class="kpi"><span>Conversion</span><strong>5.4%</strong></div>
    </div>
    <div class="graph"></div>
  </div>
</section>

<!-- DYNAMIC SECTIONS -->
<section id="experience-section"></section>
<section id="featured-section"></section>
<section id="projects-section"></section>
<section id="education-section"></section>
<section id="contact-section"></section>

<footer>© Pranab Debnath</footer>

<!-- =========================================================
     DATA SERVICE (MUST LOAD FIRST)
========================================================= -->
<script src="./assets/js/services/data.service.js"></script>

<!-- =========================================================
     BOOTSTRAP
========================================================= -->
<script src="./assets/js/core/bootstrap.js"></script>

<!-- =========================================================
     APP RENDERER
========================================================= -->
<script src="./assets/js/renderers/app.renderer.js"></script>

</body>
</html>
