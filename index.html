<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Omniverse — Liquid Glass</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ================= ROOT ================= */
:root {
  --bg-main: #05030c;
  --bg-deep: #090613;
  --violet: #a78bfa;
  --violet-blue: #60a5fa;
  --violet-glow: rgba(167,139,250,.35);
  --text-main: rgba(255,255,255,.96);
  --text-muted: rgba(255,255,255,.62);
  --ease: cubic-bezier(.22,1,.36,1);
}

/* ================= RESET ================= */
* { box-sizing: border-box; }
html,body { margin:0; padding:0; }

body {
  font-family: Inter, system-ui, sans-serif;
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,58,237,.18), transparent),
    radial-gradient(700px 520px at 15% 120%, rgba(167,139,250,.14), transparent),
    linear-gradient(180deg, #04020a, var(--bg-deep) 55%, #04020a);
}

/* ================= COSMIC LAYERS ================= */
#stars,
#shooting-stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

#stars { z-index: -3; }
#shooting-stars { z-index: -2; }

/* ================= DEMO HERO ================= */
.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10rem 2rem;
}

.hero h1 {
  font-size: clamp(42px,6vw,64px);
  font-weight: 500;
  letter-spacing: -0.035em;
}

.hero p {
  max-width: 60ch;
  color: var(--text-muted);
  margin-top: 1.4rem;
}

/* ================= LIQUID DASHBOARD ================= */
.dashboard {
  margin-top: 4rem;
  padding: 3.6rem;
  border-radius: 32px;
  position: relative;
  overflow: hidden;

  background:
    radial-gradient(
      140% 120% at 12% 8%,
      rgba(255,255,255,.22),
      rgba(255,255,255,.06) 38%,
      rgba(9,6,19,.88) 78%
    );

  backdrop-filter: blur(26px) saturate(150%);
  box-shadow: 0 80px 180px rgba(0,0,0,.9);
}

/* Edge refraction */
.dashboard::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: linear-gradient(140deg,
    rgba(255,255,255,.6),
    transparent 40%,
    transparent 60%,
    rgba(167,139,250,.5)
  );
  opacity:.18;
}

/* Glow */
.dashboard::after {
  content:"";
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(circle at 30% 40%, rgba(167,139,250,.35), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(96,165,250,.25), transparent 60%);
  filter: blur(180px);
  opacity:.6;
}
</style>
</head>

<body>

<!-- Cosmic background -->
<canvas id="stars"></canvas>
<svg id="shooting-stars"></svg>

<section class="hero">
  <h1>Omniverse Dashboard</h1>
  <p>
    Apple-grade liquid glass UI with physically believable cosmic motion.
    Nothing decorative. Everything intentional.
  </p>

  <div class="dashboard">
    Premium floating analytics surface
  </div>
</section>

<script>
/* ============================================================
   STAR FIELD (Canvas) — PORTED FROM YOUR CODE
============================================================ */

const starCanvas = document.getElementById("stars");
const ctx = starCanvas.getContext("2d");

let stars = [];
const density = 0.00015;

function resizeStars() {
  starCanvas.width = innerWidth;
  starCanvas.height = innerHeight;
  const count = Math.floor(innerWidth * innerHeight * density);

  stars = Array.from({ length: count }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * .8 + .4,
    o: Math.random() * .5 + .4,
    tw: Math.random() * .8 + .4
  }));
}

function renderStars() {
  ctx.clearRect(0,0,starCanvas.width,starCanvas.height);
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.o})`;
    ctx.fill();
    s.o = .5 + Math.abs(Math.sin(Date.now()*.001 / s.tw) * .5);
  });
  requestAnimationFrame(renderStars);
}

resizeStars();
renderStars();
addEventListener("resize", resizeStars);

/* ============================================================
   SHOOTING STAR (SVG) — PORTED CLEANLY
============================================================ */

const svg = document.getElementById("shooting-stars");

function spawnStar() {
  const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
  const angle = Math.random()*360;
  let x = Math.random()*innerWidth;
  let y = -50;

  rect.setAttribute("x", x);
  rect.setAttribute("y", y);
  rect.setAttribute("width", 120);
  rect.setAttribute("height", 1.2);
  rect.setAttribute("fill", "url(#grad)");
  rect.setAttribute("transform", `rotate(${angle} ${x} ${y})`);

  svg.appendChild(rect);

  let d = 0;
  const speed = Math.random()*20 + 12;

  function animate() {
    d += speed;
    rect.setAttribute("x", x - d);
    rect.setAttribute("y", y + d);
    rect.setAttribute("opacity", 1 - d / (innerWidth*1.2));
    if (d < innerWidth*1.2) requestAnimationFrame(animate);
    else rect.remove();
  }
  animate();

  setTimeout(spawnStar, Math.random()*4000 + 2000);
}

svg.innerHTML = `
<defs>
  <linearGradient id="grad">
    <stop offset="0%" stop-color="rgba(96,165,250,0)" />
    <stop offset="100%" stop-color="#a78bfa" />
  </linearGradient>
</defs>`;
spawnStar();
</script>

</body>
</html>
