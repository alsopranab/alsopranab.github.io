<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pranab Debnath — Omniverse</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   OMNIVERSE — SINGLE FILE BUILD (FINAL)
============================================================ */

:root {
  --bg-main:#05030c;
  --bg-deep:#090613;
  --violet:#a78bfa;
  --violet-blue:#60a5fa;
  --violet-glow:rgba(167,139,250,.35);
  --text-main:rgba(255,255,255,.96);
  --text-muted:rgba(255,255,255,.62);
  --text-faint:rgba(255,255,255,.42);
  --ease:cubic-bezier(.22,1,.36,1);
  --radius-xl:32px;
}

*,
*::before,
*::after { box-sizing:border-box; }

html,body {
  margin:0;
  padding:0;
}

body {
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(900px 600px at 70% -10%, rgba(124,58,237,.18), transparent),
    radial-gradient(700px 520px at 15% 120%, rgba(167,139,250,.14), transparent),
    linear-gradient(180deg,#04020a,var(--bg-deep) 55%,#04020a);
}

/* Cosmic layers */
#cosmic-stars,
#cosmic-shooting {
  position:fixed;
  inset:0;
  pointer-events:none;
}
#cosmic-stars { z-index:-3; }
#cosmic-shooting { z-index:-2; }

/* Layout */
section {
  max-width:1200px;
  margin:0 auto;
  padding:clamp(6rem,10vw,10rem) 2rem;
}

h1 {
  font-size:clamp(42px,6vw,64px);
  font-weight:500;
  letter-spacing:-.035em;
}

p {
  font-size:15px;
  line-height:1.75;
  color:var(--text-muted);
  max-width:68ch;
}

.hero {
  padding-top:12rem;
}

.hero-tagline {
  margin-top:1.2rem;
  color:var(--violet);
  font-weight:500;
}

.dashboard {
  margin-top:5rem;
  padding:3.8rem;
  border-radius:var(--radius-xl);
  background:
    radial-gradient(
      140% 120% at 12% 8%,
      rgba(255,255,255,.22),
      rgba(255,255,255,.06) 38%,
      rgba(9,6,19,.88) 78%
    );
  backdrop-filter:blur(28px) saturate(150%);
  box-shadow:
    0 80px 180px rgba(0,0,0,.9),
    inset 0 1px 0 rgba(255,255,255,.25);
}

.kpis {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:2rem;
  margin-bottom:3rem;
}

.kpi {
  padding:1.4rem 1.6rem;
  border-radius:18px;
  background:rgba(255,255,255,.05);
}

.graph {
  height:280px;
  border-radius:20px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,.06),
    rgba(255,255,255,.015)
  );
}

.project {
  margin-top:6rem;
  opacity:0;
  transform:translateY(60px);
  transition:all 900ms var(--ease);
}
.project.is-visible {
  opacity:1;
  transform:none;
}

footer {
  padding:6rem 2rem;
  text-align:center;
  color:var(--text-faint);
}
</style>
</head>

<body>

<!-- Cosmic Background -->
<canvas id="cosmic-stars"></canvas>
<svg id="cosmic-shooting"></svg>

<main>
  <section class="hero">
    <h1>Pranab Debnath</h1>
    <div class="hero-tagline">Data • Analytics • Automation</div>
    <p>I design analytical systems that turn raw data into strategic decisions.</p>

    <div class="dashboard">
      <div class="kpis">
        <div class="kpi"><span>Revenue</span><strong>₹4.8M</strong></div>
        <div class="kpi"><span>Growth</span><strong>+32%</strong></div>
        <div class="kpi"><span>Conversion</span><strong>5.4%</strong></div>
      </div>
      <div class="graph"></div>
    </div>
  </section>

  <section class="project">
    <h2>Projects</h2>
    <p>Scroll-based dashboard storytelling.</p>
  </section>
</main>

<footer>© Pranab Debnath</footer>

<!-- ============================================================
     OMNIVERSE RUNTIME — SINGLE CONTROLLER
============================================================ -->
<script>
(() => {
  "use strict";

  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;

  /* ---------- STAR FIELD ---------- */
  const canvas = document.getElementById("cosmic-stars");
  const ctx = canvas.getContext("2d");
  let stars = [];
  const density = 0.00015;

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    stars = Array.from(
      { length: innerWidth * innerHeight * density },
      () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: Math.random() * 0.8 + 0.4,
        t: Math.random() * 0.8 + 0.4
      })
    );
  }

  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const time = Date.now() * 0.001;
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(time/s.t)*0.3})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  drawStars();
  addEventListener("resize", resize);

  /* ---------- SHOOTING STAR ---------- */
  const svg = document.getElementById("cosmic-shooting");
  svg.innerHTML = `
    <defs>
      <linearGradient id="trail">
        <stop offset="0%" stop-color="rgba(96,165,250,0)" />
        <stop offset="100%" stop-color="#a78bfa" />
      </linearGradient>
    </defs>
  `;

  function shoot() {
    const r = document.createElementNS("http://www.w3.org/2000/svg","rect");
    let x = Math.random() * innerWidth;
    let y = -100;
    r.setAttribute("width",140);
    r.setAttribute("height",1.2);
    r.setAttribute("fill","url(#trail)");
    svg.appendChild(r);

    let d = 0;
    function anim() {
      d += 18;
      r.setAttribute("x", x - d);
      r.setAttribute("y", y + d);
      if (d < innerWidth * 1.3) requestAnimationFrame(anim);
      else r.remove();
    }
    anim();
    setTimeout(shoot, 2000 + Math.random() * 4000);
  }
  shoot();

  /* ---------- SCROLL REVEAL ---------- */
  const io = new IntersectionObserver(e =>
    e.forEach(x => x.isIntersecting && x.target.classList.add("is-visible")),
    { threshold: 0.2 }
  );
  document.querySelectorAll(".project").forEach(el => io.observe(el));

})();
</script>

</body>
</html>
