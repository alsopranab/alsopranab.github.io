name: Generate GitHub Contributions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch contributions from GitHub
        run: |
          mkdir -p assets/data

          curl -s -X POST https://api.github.com/graphql \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "query ($login: String!) { user(login: $login) { contributionsCollection { contributionCalendar { weeks { contributionDays { date contributionCount } } } } } }",
              "variables": { "login": "alsopranab" }
            }' > response.json

          cat response.json

          jq -r '
            if .data and .data.user then
              .data.user.contributionsCollection.contributionCalendar.weeks[]
              .contributionDays[]
              | {date: .date, count: .contributionCount}
            else
              empty
            end
          ' response.json > assets/data/contributions.json

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/data/contributions.json
          git commit -m "Update contributions data" || echo "No changes"
          git push
