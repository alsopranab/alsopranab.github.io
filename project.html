<!DOCTYPE html>
<html>
<head>
  <title>Projects</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
</nav>

<section>
  <h1>Projects</h1>
  <div id="projects" class="grid"></div>
</section>

<script>
fetch("https://api.github.com/users/alsopranab/repos")
  .then(r => r.json())
  .then(repos => {
    repos
      .filter(r => !r.fork)
      .forEach(r => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${r.name}</h3>
          <p>${r.description || ""}</p>
          <button onclick="location.href='project.html?repo=${r.name}'">
            Open
          </button>
        `;
        document.getElementById("projects").appendChild(card);
      });
  });
</script>

</body>
</html>
