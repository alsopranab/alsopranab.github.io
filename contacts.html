<section>
  <h1>Connect with me</h1>
  <div id="socials" class="card"></div>
</section>

<script>
fetch("assets/data/socials.json")
  .then(r => r.json())
  .then(d => {
    const box = document.getElementById("socials");
    Object.entries(d).forEach(([k,v]) => {
      box.innerHTML += `<p><a href="${v}" target="_blank">${k}</a></p>`;
    });
  });
</script>

</body>
