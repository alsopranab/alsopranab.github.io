    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-dark: #0a0118; /* Deepest Violet/Black */
            --bg-card: #150528; /* Dark Violet Card */
            --primary: #8b5cf6; /* Violet 500 */
            --primary-hover: #7c3aed; /* Violet 600 */
            --accent: #06b6d4; /* Cyan 500 */
            --text-main: #f8fafc; /* Ice White */
            --text-muted: #94a3b8; /* Stardust Grey */
            --nav-height: 4rem;
        }
    }

    @layer base {
        body {
            @apply bg-[var(--bg-dark)] text-[var(--text-main)] antialiased font-sans selection:bg-[var(--accent)] selection:text-black;
            background-image: radial-gradient(circle at 50% 0%, #2e1065 0%, #0a0118 70%);
            background-attachment: fixed;
        }
        h1, h2, h3, h4, h5, h6 {
            @apply tracking-tight font-bold;
        }
    }

    @layer components {
        .glass-panel {
            @apply bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-lg shadow-purple-900/20;
        }
        .btn {
            @apply px-6 py-3 rounded-full font-medium transition-all duration-300 inline-flex items-center gap-2 text-sm;
        }
        .btn-primary {
            @apply bg-gradient-to-r from-[var(--primary)] to-purple-600 text-white hover:brightness-110 shadow-[0_0_20px_rgba(112,0,223,0.4)] hover:shadow-[0_0_35px_rgba(112,0,223,0.6)] transform hover:scale-105;
        }
        .btn-outline {
            @apply border border-white/20 text-white hover:bg-white/10 backdrop-blur-sm;
        }
        .card {
            @apply bg-[var(--bg-card)] border border-white/10 rounded-2xl p-6 transition-all duration-500 hover:shadow-2xl;
            /* Using explicit rgba values for hover states to avoid Tailwind arbitrary variable opacity issues */
        }
        .card:hover {
            border-color: rgba(112, 0, 223, 0.5);
            box-shadow: 0 25px 50px -12px rgba(112, 0, 223, 0.2);
        }
        .section-padding {
            @apply py-24 px-6 md:px-12 max-w-7xl mx-auto;
        }
        .text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-[var(--accent)] via-[#e879f9] to-[var(--primary)] bg-[length:200%_auto] animate-gradient;
        }
        .nav-link {
            @apply text-[var(--text-muted)] hover:text-white transition-colors text-sm font-medium tracking-wide;
        }
    }

    @layer utilities {
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 7s ease-in-out 2s infinite;
        }
        .animate-float-slow {
            animation: float 9s ease-in-out 1s infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient {
            animation: gradient 5s ease infinite;
        }
        
        /* Drawing animation for SVG */
        .animate-draw-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 3s ease-out forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        /* Cyber Grid Background Animation */
        .cyber-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(112, 0, 223, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(112, 0, 223, 0.05) 1px, transparent 1px);
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #030014; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary); 
        }
    }
